# =====================================
# ASPECTO GENERAL
# =====================================
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(00ffffee) rgba(ff00ffee) 90deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    allow_tearing = false
    resize_on_border = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 2
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
    }
}

animations {
    enabled = true

    # Curvas Bezier personalizadas
    bezier = smoothOut, 0.25, 1, 0.5, 1
    bezier = smoothIn, 0.4, 0, 0.2, 1
    bezier = soft, 0.2, 0.8, 0.2, 1

    # Apertura/cierre de ventanas
    animation = windowsIn, 1, 6, smoothOut, popin 90%
    animation = windowsOut, 1, 5, smoothIn, popin 90%
    animation = windowsMove, 1, 5, soft

    animation = fadeIn, 1, 7, smoothOut
    animation = fadeOut, 1, 5, smoothIn
    animation = fadeSwitch, 1, 5, soft
    animation = fadeDim, 1, 5, soft

    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default

    animation = workspaces, 1, 7, smoothOut, slide
    animation = specialWorkspace, 1, 6, smoothOut, slidevert
}
